<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>GHOST Checkout</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{
    background:#f9f9f9;
    color:#111;
    overflow-x:hidden;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 16px;
    background:#fff;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
}

.left-header{
    display:flex;
    gap:10px;
    align-items:center;
}

.back{
    cursor:pointer;
    color:#555;
    font-size:14px;
}

.brand{
    letter-spacing:4px;
    font-weight:700;
    font-size:14px;
}

/* LAYOUT */
.container{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    padding:15px;
}

/* FORM */
.form{
    flex:1 1 320px;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:14px;
}

/* DELIVERY */
.delivery-options{
    margin-top:15px;
}

.option{
    border:1px solid #ddd;
    padding:12px;
    margin-top:8px;
    cursor:pointer;
    border-radius:8px;
}

.option.active{
    border:2px solid black;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    background:black;
    color:white;
    border:none;
    margin-top:15px;
    font-weight:600;
    cursor:pointer;
}

/* PAYMENTS */
.payments{
    margin-top:18px;
    text-align:center;
    font-size:12px;
    color:#666;
}

.payments img{
    height:20px;
    margin:4px;
}

/* SUMMARY */
.summary{
    flex:1 1 320px;
    background:#fff;
    padding:20px;
    border-radius:12px;
}

.summary h2{
    text-align:center;
    margin-bottom:15px;
    font-size:16px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
    font-size:14px;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-size:14px;
}

.total{
    font-size:16px;
    font-weight:bold;
    border-top:1px solid #eee;
    padding-top:10px;
    margin-top:12px;
}

/* MOBILE */
@media (max-width:768px){
    .container{
        flex-direction:column;
    }
}
</style>
</head>

<body>

<div class="header">
    <div class="left-header">
        <div class="back" onclick="goBack()">← Back</div>
        <div class="brand">GHOST</div>
    </div>
</div>

<div class="container">

<div class="form">
<h2>Checkout</h2>

<input id="name" placeholder="Full Name">
<input id="email" type="email" placeholder="Email Address">
<input id="phone" placeholder="712345678 (we auto add +27)">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">

<div class="delivery-options" id="deliveryBox">
<h3>Select Delivery</h3>

<!-- ✅ ADDED PICKUP -->
<div class="option active" onclick="selectDelivery('pickup',0,this)">
Store Pickup — FREE
</div>

<div class="option" onclick="selectDelivery('paxi',100,this)">
PAXI Pickup — R100
</div>

<div class="option" onclick="selectDelivery('courier',120,this)">
Courier Delivery — R120
</div>

</div>

<button onclick="payNow()">Proceed to Pay</button>

<div class="payments">
We accept:<br>
<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Google_Pay_Logo.svg">
</div>

</div>

<div class="summary">
<h2>Your Shopping Bag</h2>

<div id="items"></div>

<div class="row">
<span>Subtotal</span>
<span>R <span id="subtotal">0</span></span>
</div>

<div class="row">
<span>Delivery</span>
<span>R <span id="delivery">0</span></span>
</div>

<div class="row total">
<span>Total</span>
<span>R <span id="total">0</span></span>
</div>

</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("ghost_cart")) || [];

/* ✅ DEFAULT NOW FREE */
let deliveryFee = 0;

function renderCart(){
let html = "";
let subtotal = 0;

cart.forEach(item=>{
let itemTotal = item.price * item.qty;
subtotal += itemTotal;

html += `
<div class="item">
<span>${item.name} (x${item.qty})</span>
<span>R${itemTotal}</span>
</div>`;
});

document.getElementById("items").innerHTML = html;
document.getElementById("subtotal").innerText = subtotal;

updateDelivery(subtotal);
}

function updateDelivery(subtotal){

let box = document.getElementById("deliveryBox");

if(subtotal >= 1000){
deliveryFee = 0;
box.innerHTML = "<h3>Free Delivery (Orders over R1000)</h3>";
} else {
box.innerHTML = `
<h3>Select Delivery</h3>

<div class="option active" onclick="selectDelivery('pickup',0,this)">
Store Pickup — FREE
</div>

<div class="option" onclick="selectDelivery('paxi',100,this)">
PAXI Pickup — R100
</div>

<div class="option" onclick="selectDelivery('courier',120,this)">
Courier Delivery — R120
</div>
`;
}

calculateTotal();
}

function selectDelivery(type, price, el){
deliveryFee = price;

document.querySelectorAll(".option").forEach(o=>o.classList.remove("active"));
el.classList.add("active");

calculateTotal();
}

function calculateTotal(){
let subtotal = parseFloat(document.getElementById("subtotal").innerText || 0);
let total = subtotal + deliveryFee;

document.getElementById("delivery").innerText = deliveryFee;
document.getElementById("total").innerText = total;
}

function payNow(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let phone = document.getElementById("phone").value.trim();
let address = document.getElementById("address").value.trim();
let city = document.getElementById("city").value.trim();

if(!name || !email || !phone || !address || !city){
alert("Please enter all your details to proceed");
return;
}

if(cart.length === 0){
alert("Cart is empty");
return;
}

let order = {
name,
email,
phone: "+27" + phone.replace(/\D/g,''),
address,
city,
items: cart,
delivery: deliveryFee,
status: "Awaiting Payment"
};

localStorage.setItem("last_order", JSON.stringify(order));

window.location.href = "success.html";
}

function goBack(){
window.location.href="shop.html";
}

renderCart();
</script>

</body>
</html>
